<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小智语音助手</title>

    <!-- 不再需要在浏览器端加载 Opus 库 -->
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            color: white;
        }
        
        #startBtn {
            background-color: #007bff;
        }
        
        #stopBtn {
            background-color: #dc3545;
        }
        
        #interruptBtn {
            background-color: #ffc107;
            color: black;
        }
        
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        #status,
        #platformInfo,
        #logs {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        #logs {
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
        
        #platformInfo {
            font-size: 12px;
        }
    </style>
    <script src="/node_modules/opus-decoder/dist/opus-decoder.min.js"></script>
</head>

<body>
    <div id="error-container" style="color: red; border: 1px solid red; margin-bottom: 10px; padding: 10px; display: none;"></div>


    <div id="status">状态: 空闲</div>

    <div>
        <button id="startBtn">开始语音聊天</button>
        <!-- <button id="stopBtn" disabled>停止聊天</button> -->
        <button id="interruptBtn">打断对话</button>
    </div>

    <div style="display: none;">
        <h3>平台信息:</h3>
        <pre id="platformInfo"></pre>
    </div>

    <!-- <div>
        <h3>日志:</h3>
        <div id="logs"></div>
    </div> -->

    <script type="module">
        import { browserClient } from './src/web/index.js'; browserClient(); // 启动客户端
    </script>

</body>

</html>

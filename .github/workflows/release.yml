name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: x86_64-apple-darwin
            asset_name: xiaozhi_client-x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-dosx
            asset_name: xiaozhi_client-aarch64-apple-darwin
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: xiaozhi_client-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: xiaozhi_client-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          brew install cmake opus

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libopus-dev

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cd rust
          cargo build --release --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/xiaozhi_client || true

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: rust/target/${{ matrix.target }}/release/xiaozhi_client

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '*/*'
          body: |
            ## 安装说明

            ### macOS / Linux
            ```bash
            # 下载并运行安装脚本
            curl -L https://github.com/shadowcz007/xiaozhi_client/releases/download/${{ github.ref_name }}/install.sh | bash
            ```

            ### Windows
            下载并运行 `install.bat`

            ## 或手动安装
            下载对应平台的二进制文件，添加到 PATH即可。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload install scripts
        uses: actions/upload-artifact@v4
        with:
          name: install-scripts
          path: |
            install.sh
            install.bat
          retention-days: 30